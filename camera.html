<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Focal Lab · 카메라 화각</title>
  <meta name="description" content="카메라 라이브뷰 위에 선택한 포맷의 환산 화각과 풀프레임 프레이밍을 실시간으로 겹쳐 보는 AR 프레이밍 뷰">
  <link rel="stylesheet" href="shared/style.css">
  <link rel="stylesheet" href="src/app.css">
  <link rel="stylesheet" href="src/camera.css">
  <script src="shared/theme.js" data-storage-key="focal-lab-theme" data-migrate-from="photologs-theme"></script>
</head>
<body class="camera-page">
  <script src="shared/nav.js" data-home="./" data-brand="Focal Lab"></script>

  <main class="cam">
    <div class="cam-stage" id="cam-stage">
      <video id="cam-video" playsinline muted autoplay></video>
      <canvas id="cam-canvas"></canvas>

      <div class="cam-readout" id="cam-readout" aria-live="polite"></div>
      <div class="cam-warn" id="cam-warn" hidden></div>

      <!-- 시작/에러 안내 (카메라 권한은 사용자 제스처로 시작) -->
      <div class="cam-msg" id="cam-msg">
        <p class="cam-msg__text" id="cam-msg-text">카메라로 선택한 포맷의 화각을 실제 화면 위에서 확인합니다.</p>
        <button class="cam-msg__btn" id="cam-start" type="button">📷 카메라 시작</button>
      </div>
    </div>

    <div class="cam-panel" id="cam-panel">
      <button class="cam-handle" id="cam-handle" type="button" aria-expanded="true" aria-controls="cam-body">
        <span class="cam-handle__summary" id="cam-summary">입력값</span>
        <span class="cam-handle__chevron" aria-hidden="true">▾</span>
      </button>

      <div class="cam-body" id="cam-body">
        <div class="field">
          <label for="cam-format">포맷</label>
          <select id="cam-format" aria-label="포맷 선택"></select>
          <div class="hint" id="cam-format-note"></div>
        </div>

        <div class="field">
          <label for="cam-focal">초점거리</label>
          <div class="combo">
            <span class="input-unit" data-unit="mm">
              <input type="text" id="cam-focal" inputmode="decimal" value="80" aria-label="초점거리 입력">
            </span>
            <input type="range" id="cam-focal-range" min="1" max="600" step="1" value="80" aria-label="초점거리 슬라이더">
          </div>
        </div>

        <div class="field">
          <label for="cam-ref">내 폰 카메라 (렌즈)</label>
          <select id="cam-ref" aria-label="기준 카메라 렌즈 선택"></select>
          <div class="hint">라이브뷰의 실제 화각 기준. 정확히 고를수록 오버레이가 뷰파인더처럼 맞습니다.</div>
        </div>

        <details class="advanced" id="cam-advanced">
          <summary>고급 · 정밀 보정 · 장치</summary>
          <div class="field">
            <label for="cam-corr">정밀 보정 <output id="cam-corr-val">0%</output></label>
            <input type="range" id="cam-corr" min="0.6" max="1.6" step="0.01" value="1" aria-label="정밀 보정">
            <p class="hint">오버레이가 실제보다 작으면 −, 크면 + 쪽으로 미세조정.</p>
          </div>
          <div class="field" id="cam-device-field" hidden>
            <label for="cam-device">실제 카메라 장치</label>
            <select id="cam-device" aria-label="카메라 장치 선택"></select>
          </div>
        </details>

        <a class="cam-back" href="./">← 환산기로</a>
      </div>
    </div>
  </main>

  <script src="src/convert.js"></script>
  <script src="src/formats.js"></script>
  <script src="src/camera.js"></script>
</body>
</html>
